spring:
  config:
    activate:
      on-profile: local

  thymeleaf:
    cache: false

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: ${LOCAL_DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  token-validity-in-seconds: ${LOCAL_JWT_VALIDITY:36400}
  refresh-token-validity-in-seconds: ${LOCAL_JWT_REFRESH_VALIDITY:804600}

portone:
  api:
    secret: ${LOCAL_PORTONE_API_SECRET}
  store:
    id: ${LOCAL_PORTONE_STORE_ID}
  channel:
    toss: ${LOCAL_PORTONE_CHANNEL_TOSS}
    toss-billing: ${LOCAL_PORTONE_CHANNEL_TOSS_BILLING}

logging:
  level:
    com.example.a3sproject: DEBUG
    org.hibernate.SQL: DEBUG