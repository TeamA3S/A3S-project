spring:
  config:
    activate:
      on-profile: local

  thymeleaf:
    cache: false

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:a3sproject;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:RDdtIftiz4WlWwwz9uOfQg7T76slo0LPHZ9x0tdgE3ITYveGOLLP6qNFLaz9bFFrukJgSKf2cswP1AFKwWjXmq}
  token-validity-in-seconds: ${LOCAL_JWT_VALIDITY:36400}
  refresh-token-validity-in-seconds: ${LOCAL_JWT_REFRESH_VALIDITY:804600}

portone:
  api:
    secret: ${LOCAL_PORTONE_API_SECRET:local-test-secret}
  store:
    id: ${LOCAL_PORTONE_STORE_ID:local-test-store-id}
  channel:
    kg-inicis: ${LOCAL_PORTONE_CHANNEL_KG:local-kg-channel-key}
    toss: ${LOCAL_PORTONE_CHANNEL_TOSS:local-toss-channel-key}

logging:
  level:
    com.example.a3sproject: DEBUG
    org.hibernate.SQL: DEBUG